<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>Multi-Timezone Clock</title>\n    <style>\n        body { font-family: Arial, sans-serif; text-align: center; }\n        .clock { margin: 20px; font-size: 24px; }\n    </style>\n</head>\n<body>\n    <h1>Multi-Timezone Clock</h1>\n    <div class=\"clock\" id=\"clock\"></div>\n    <script>\n        const clocks = [\n            { label: 'UTC', offset: 0 },\n            { label: 'PST', offset: -8 },\n            { label: 'EST', offset: -5 },\n            { label: 'CET', offset: 1 },\n            { label: 'IST', offset: 5.5 }\n        ];\n\n        function updateClocks() {\n            const now = new Date();\n            let html = '';\n            clocks.forEach(clock => {\n                const localTime = new Date(now.getTime() + clock.offset * 3600 * 1000);\n                html += `<div>${clock.label}: ${localTime.toISOString().substring(0, 19).replace('T', ' ')}</div>`;\n            });\n            document.getElementById('clock').innerHTML = html;\n        }\n\n        setInterval(updateClocks, 1000);\n        updateClocks();\n    </script>\n</body>\n</html>\n
